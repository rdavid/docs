---
name: actionlint
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
  checks: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@v1.73.0
        with:
          fail_level: error
